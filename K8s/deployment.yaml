apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
      - name: node-app
        image: ameysalvi5675/node-ci-cd:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000